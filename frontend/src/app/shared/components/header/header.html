<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
  <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-3">
      <button
        type="button"
        class="rounded-xl border border-slate-200 p-2 text-slate-600 hover:bg-slate-100 lg:hidden"
        (click)="menuToggle.emit()"
        aria-label="Abrir menu"
      >
        ☰
      </button>

      <div>
        <p class="text-xs uppercase tracking-[0.14em] text-slate-400">Taskflow</p>
        <h1 class="text-lg font-semibold text-slate-900">{{ pageTitle }}</h1>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="hidden text-right sm:block">
        <p class="text-sm font-semibold text-slate-900">
          {{ authService.getCurrentUser()?.name }}
        </p>
        <p class="text-xs text-slate-500">
          {{ authService.getCurrentUser()?.role }}
        </p>
      </div>

      <div
        class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-900 text-sm font-semibold text-white"
      >
        {{ authService.getCurrentUser()?.name?.charAt(0) }}
      </div>
    </div>
  </div>
</header>
