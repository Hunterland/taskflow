<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">
    <h1 class="text-3xl font-bold text-slate-900">Criar conta</h1>
    <p class="mt-2 text-sm text-slate-600">Cadastre-se para acessar o TaskFlow.</p>

    <form class="mt-6 space-y-4" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div>
        <label for="name" class="mb-1 block text-sm font-medium text-slate-700">Nome</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-emerald-500"
          placeholder="Seu nome"
        />
        <p *ngIf="form.name.touched && form.name.invalid" class="mt-1 text-sm text-red-600">
          Informe um nome válido.
        </p>
      </div>

      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-emerald-500"
          placeholder="seuemail@exemplo.com"
        />
        <p *ngIf="form.email.touched && form.email.invalid" class="mt-1 text-sm text-red-600">
          Informe um email válido.
        </p>
      </div>

      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-emerald-500"
          placeholder="******"
        />
        <p *ngIf="form.password.touched && form.password.invalid" class="mt-1 text-sm text-red-600">
          A senha deve ter pelo menos 6 caracteres.
        </p>
      </div>

      <div>
        <label for="confirmPassword" class="mb-1 block text-sm font-medium text-slate-700">
          Confirmar senha
        </label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-emerald-500"
          placeholder="******"
        />
        <p
          *ngIf="form.confirmPassword.touched && form.confirmPassword.invalid"
          class="mt-1 text-sm text-red-600"
        >
          Confirme sua senha.
        </p>
        <p *ngIf="passwordMismatch" class="mt-1 text-sm text-red-600">As senhas não coincidem.</p>
      </div>

      <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full rounded-xl bg-teal-600 px-4 py-3 font-semibold text-white transition hover:bg-teal-700 disabled:opacity-60"
      >
        {{ isLoading ? 'Criando conta...' : 'Cadastrar' }}
      </button>
    </form>

    <div class="mt-8 border-t border-slate-200 pt-6 text-center">
      <p class="text-sm text-slate-600">Já tem conta?</p>
      <a
        routerLink="/login"
        class="mt-3 inline-flex items-center justify-center rounded-xl bg-slate-100 px-5 py-3 text-sm font-semibold text-slate-800 transition hover:bg-slate-200"
      >
        Entrar
      </a>
    </div>
  </div>
</div>
